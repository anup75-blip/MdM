[theme]
primaryColor          = "#1B5E20"
backgroundColor       = "#F8FAF8"
secondaryBackgroundColor = "#E8F5E9"
textColor             = "#1C2B1C"
font                  = "sans serif"

[client]
# Hide raw Python tracebacks from users in production
showErrorDetails = false

[server]
port     = 8501
headless = true

[runner]
# Prevent accidental data leakage between reruns
enforceSerializableSessionState = false
